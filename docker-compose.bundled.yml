services:
  dataclaw:
    build:
      context: .
      dockerfile: Dockerfile.bundled
    ports:
      - "${DATACLAW_PORT:-8000}:${DATACLAW_PORT:-8000}"
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:${OPENCLAW_BRIDGE_PORT:-18790}"
    volumes:
      - ${DOCKER_DATA_DIR:-./docker-data}/openclaw:/root/.openclaw
      - ${DOCKER_DATA_DIR:-./docker-data}/dataclaw:/root/.dataclaw
    environment:
      # Core ports/host — always passed
      DATACLAW_HOST: ${DATACLAW_HOST:-0.0.0.0}
      DATACLAW_PORT: ${DATACLAW_PORT:-8000}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_BRIDGE_PORT: ${OPENCLAW_BRIDGE_PORT:-18790}
      # Pass through only when explicitly set on the host. Defaulting it
      # forces every container into openclaw mode and silently overrides
      # the user's saved llm.backend choice (env vars beat the config
      # file in the resolver).
      DATACLAW_LLM_BACKEND:
      # Optional overrides — only passed when set on the host.
      # When unset, the entrypoint derives sensible defaults
      # (tokens default to the gateway token, API URL to loopback).
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      # Shared bearer token for the consolidated `dataclaw` plugin (channel +
      # tools). Leave unset to let the entrypoint default to "dataclaw-local".
      DATACLAW_TOKEN:
      DATACLAW_API_URL:
      DATACLAW_OPENCLAW_URL:
      # LLM provider API keys
      ANTHROPIC_API_KEY:
      OPENAI_API_KEY:
      GEMINI_API_KEY:
    env_file:
      - path: .env
        required: false
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
